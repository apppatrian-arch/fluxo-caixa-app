<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fundo arredondado azul -->
  <rect width="512" height="512" rx="100" fill="#1a73e8"/>

  <!-- Cifrão estilizado -->
  <text x="256" y="340" font-family="Arial, sans-serif" font-size="280" font-weight="bold"
        text-anchor="middle" fill="white">$</text>

  <!-- Seta para cima (recebimento) -->
  <polygon points="120,200 160,130 200,200" fill="#0f9d58"/>
  <rect x="148" y="195" width="24" height="60" rx="4" fill="#0f9d58"/>

  <!-- Seta para baixo (pagamento) -->
  <polygon points="312,190 352,260 392,190" fill="#d93025"/>
  <rect x="340" y="130" width="24" height="65" rx="4" fill="#d93025"/>
</svg>
